<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta name="author" content="Linda Kovacs" />
    <link
      href="https://fonts.googleapis.com/css?family=Raleway"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.8.1/css/all.css"
      integrity="sha384-50oBUHEmvpQ+1lW4y57PTFmhCaXp0ML5d60M1M7uH2+nqUivzIebhndOJK28anvf"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dark-mode.css" />
    <link rel="stylesheet" href="css/chat-bot.css" />
    <title>Posts - UAlbany Campus</title>
  </head>

  <style>
    #page-loading {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    #page-loading.active {
      display: flex;
    }
    #page-loading p {
      color: white;
      font-size: 1.2rem;
    }
  </style>
  <body>
    <!-- top anchor for Back-to-Top -->
    <a id="top"></a>

    <!-- Navbar loaded from modules -->
    <header id="navbar-container"></header>
    <script>
      fetch('modules/navbar.html')
        .then((response) => response.text())
        .then((html) => {
          document.getElementById('navbar-container').innerHTML = html;
          // Update navbar auth state after navbar is loaded
          if (typeof updateNavbarAuth === 'function') {
            updateNavbarAuth();
          }
        })
        .catch((error) => console.error('Error loading navbar:', error));
    </script>
    <main>
      <div id="page-loading" class="active">
        <p>Loading posts...</p>
      </div>
      <section class="container">
        <h1 class="large text-primary">Posts</h1>
        <p class="lead">
          <i class="fas fa-user"></i> Welcome to Online UAlbany Students
          Community!
        </p>

        <div class="post-form">
          <div class="bg-primary p">
            <h3>Say Something...</h3>
          </div>
          <form class="form my-1">
            <textarea
              name="text"
              cols="30"
              rows="5"
              placeholder="Create a post"
              required
            ></textarea>
            <input type="submit" class="btn btn-dark my-1" value="Submit" />
          </form>
        </div>

        <!-- Posts will be loaded here by posts-feed.js -->
        <div class="posts"></div>
      </section>
    </main>
    <!-- Footer loaded from modules -->
    <footer id="footer-container"></footer>
    <script>
      fetch('modules/footer.html')
        .then((response) => response.text())
        .then((html) => {
          document.getElementById('footer-container').innerHTML = html;
        })
        .catch((error) => console.error('Error loading footer:', error));
    </script>
    <!-- Post Interactions Script -->
    <script src="js/post-interactions.js"></script>

    <!-- Comments Module Script (for updating comment counts) -->
    <script src="js/comments.js"></script>

    <!-- Frontend Configuration -->
    <script src="frontend/config.js"></script>

    <!-- API Client -->
    <script src="frontend/js/api-client.js"></script>

    <!-- Posts Feed Module (loads posts from API) -->
    <script src="js/posts-feed.js"></script>

    <!-- Accessibility Features Scripts -->
    <script src="js/accessibility.js"></script>
    <script src="js/accessibility-ui.js"></script>

    <!-- Navbar Authentication Handler -->
    <script src="js/navbar-auth.js"></script>

    <!-- Chat Bot Script -->
    <script src="js/chat-bot.js"></script>
  </body>
</html>
