<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta name="author" content="Linda Kovacs" />
    <link
      href="https://fonts.googleapis.com/css?family=Raleway"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.8.1/css/all.css"
      integrity="sha384-50oBUHEmvpQ+1lW4y57PTFmhCaXp0ML5d60M1M7uH2+nqUivzIebhndOJK28anvf"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dark-mode.css" />
    <link rel="stylesheet" href="css/chat-bot.css" />
    <title>Welcome To UAlbany Campus - Register</title>
    <!-- API Configuration -->
    <script src="frontend/config.js"></script>
  </head>
  <body>
    <!-- top anchor for Back-to-Top -->
    <a id="top"></a>

    <!-- Navbar loaded from modules -->
    <header id="navbar-container"></header>
    <script>
      fetch('modules/navbar.html')
        .then((response) => response.text())
        .then((html) => {
          document.getElementById('navbar-container').innerHTML = html;
          // Update navbar auth state after navbar is loaded
          if (typeof updateNavbarAuth === 'function') {
            updateNavbarAuth();
          }
        })
        .catch((error) => console.error('Error loading navbar:', error));
    </script>
    <main>
      <section class="container">
        <h1 class="large text-primary">Sign Up</h1>
        <p class="lead"><i class="fas fa-user"></i> Create Your Account</p>
        <div id="form-alerts"></div>
        <form
          class="form"
          id="register-form"
          data-api-endpoint="/auth/register"
        >
          <div class="form-group">
            <input
              type="text"
              placeholder="Name"
              name="name"
              id="name"
              required
              aria-label="Full name"
            />
          </div>
          <div class="form-group">
            <input
              type="email"
              placeholder="Email Address"
              name="email"
              id="email"
              required
              aria-label="Email address"
            />
            <small class="form-text"
              >This site uses Gravatar so if you want a profile image, use a
              Gravatar email</small
            >
          </div>
          <div class="form-group">
            <input
              type="password"
              placeholder="Password"
              name="password"
              id="password"
              minlength="6"
              required
              aria-label="Password"
            />
          </div>
          <div class="form-group">
            <input
              type="password"
              placeholder="Confirm Password"
              name="passwordConfirm"
              id="passwordConfirm"
              minlength="6"
              required
              aria-label="Confirm password"
            />
          </div>
          <input
            type="submit"
            class="btn btn-primary"
            value="Register"
            id="register-btn"
          />
        </form>
        <p class="my-1">
          Already have an account? <a href="login.html">Sign In</a>
        </p>
      </section>
    </main>
    <!-- Footer loaded from modules -->
    <footer id="footer-container"></footer>
    <script>
      fetch('modules/footer.html')
        .then((response) => response.text())
        .then((html) => {
          document.getElementById('footer-container').innerHTML = html;
        })
        .catch((error) => console.error('Error loading footer:', error));
    </script>
    <!-- Form Validation Script -->
    <script src="js/form-validation.js"></script>

    <!-- API Client Helper -->
    <script src="frontend/js/api-client.js"></script>

    <!-- Register Form Handler -->
    <script>
      document
        .getElementById('register-form')
        .addEventListener('submit', async (e) => {
          e.preventDefault();
          const form = e.target;
          const alertsDiv = document.getElementById('form-alerts');
          alertsDiv.innerHTML = '';

          try {
            const formData = new FormData(form);
            const userData = {
              name: formData.get('name'),
              email: formData.get('email'),
              password: formData.get('password'),
              passwordConfirm: formData.get('passwordConfirm'),
            };

            const response = await apiClient.auth.register(userData);

            // Show success message
            const alert = document.createElement('div');
            alert.className = 'alert alert-success';
            alert.innerHTML = `<strong>Success!</strong> Registration successful! Redirecting to dashboard...`;
            alertsDiv.appendChild(alert);

            // Redirect after 2 seconds
            setTimeout(() => {
              window.location.href = 'dashboard.html';
            }, 2000);
          } catch (error) {
            // Show error message
            const alert = document.createElement('div');
            alert.className = 'alert alert-danger';
            alert.innerHTML = `<strong>Error:</strong> ${error.message}`;
            alertsDiv.appendChild(alert);
          }
        });
    </script>

    <!-- Accessibility Features Scripts -->
    <script src="js/accessibility.js"></script>
    <script src="js/accessibility-ui.js"></script>

    <!-- Navbar Authentication Handler -->
    <script src="js/navbar-auth.js"></script>

    <!-- Chat Bot Script -->
    <script src="js/chat-bot.js"></script>
  </body>
</html>
